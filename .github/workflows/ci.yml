name: CI Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  # -----------------------------
  # Job 1: Lint
  # -----------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8 on app and tests
        run: |
          python -m flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          python -m flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          python -m flake8 tests --count --max-line-length=127 --statistics

  # -----------------------------
  # Job 2: Test
  # -----------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint   # runs only if lint succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: python -m pytest -v --cov=src tests/
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
        name: python-package
        path: dist/