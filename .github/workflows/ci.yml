name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Linter avec flake8
        run: |
          python -m flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          python -m flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          python -m flake8 tests --count --max-line-length=127 --statistics

      - name: Lancer les tests avec coverage
        run: python -m pytest -v --cov=app